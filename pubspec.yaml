name: Speaking_club
description: "Speaking Club - Mobile Voice & Video Calling App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.3.1
  country_code_picker: ^3.0.0

  # State Management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # Navigation
  go_router: ^17.0.1

  # Networking
  dio: ^5.4.3+1
  socket_io_client: ^3.1.4

  # WebRTC
  flutter_webrtc: ^1.3.0

  # Storage & Security
  flutter_secure_storage: ^10.0.0

  # Authentication
  google_sign_in: ^7.2.0

  # Firebase
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1
  flutter_local_notifications: ^20.0.0

  # Image handling
  image_picker: ^1.1.2
  image_cropper: ^11.0.0

  # AI Practice (Milestone 2)
  speech_to_text: ^7.3.0        # On-device STT
  flutter_tts: ^4.2.5           # On-device TTS
  audio_waveforms: ^2.0.2       # Audio visualization
  web_socket_channel: ^3.0.3    # WebSocket for OpenAI Realtime API

  # Models & Serialization
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Utilities
  intl: ^0.20.2
  logger: ^2.3.0
  connectivity_plus: ^7.0.0
  permission_handler: ^12.0.1
  envied: ^1.3.2
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.9
  freezed: ^3.2.3
  json_serializable: ^6.8.0
  riverpod_generator: ^4.0.0+1
  envied_generator: ^1.3.2

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
